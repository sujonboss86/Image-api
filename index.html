<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🚀 SUJON-BOSS Image API</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #121212; color: #fff; }
    input { width: 60%; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; margin-left: 10px; cursor: pointer; }
    img { display: block; margin-top: 20px; max-width: 90%; border: 2px solid #fff; }
    p { margin-top: 10px; }
  </style>
</head>
<body>
  <h2>🚀 SUJON-BOSS Image API</h2>
  <p>Enter your prompt and generate a 4K/8K image</p>
  
  <input type="text" id="prompt" placeholder="Type prompt here..." />
  <button onclick="generateImage()">Generate</button>
  
  <p id="status"></p>
  <img id="result" />

  <script>
    async function generateImage() {
      const prompt = document.getElementById("prompt").value.trim();
      const status = document.getElementById("status");
      const img = document.getElementById("result");
      img.src = "";
      
      if (!prompt) {
        status.innerText = "❌ Please enter a prompt!";
        return;
      }

      status.innerText = "⏳ Generating image...";
      
      try {
        const res = await fetch("https://image-api-nj0b.onrender.com/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        if (data.file) {
          const imageUrl = `https://image-api-nj0b.onrender.com/image/${data.file}`;
          img.src = imageUrl;
          status.innerText = `✅ Image generated! Auto-delete in 5 minutes.`;
        } else {
          status.innerText = "❌ " + (data.error || "Generation failed");
        }
      } catch (err) {
        status.innerText = "❌ Error: " + err.message;
      }
    }
  </script>
</body>
</html>
